<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=BBH+Sans+Bartle&display=swap"
      rel="stylesheet"
    />
    <title>Spin the wheel</title>
  </head>
  <body class="gamebackground">
    <h1 class="heading">SPIN THE WHEEL!</h1>
    <h2>SUSTAINABLE DEVELOPMENT GOALS (SDGs)</h2>
    <br />
    <br />
    <div class="mother">
      <div class="wheel-container" id="wheel">
        <div class="labels">
          <!-- 20 labels -->
          <span id="first" style="--i: 0">1</span>
          <span id="second" style="--i: 1">2</span>
          <span id="third" style="--i: 2">3</span>
          <span id="fourth" style="--i: 3">4</span>
          <span id="fifth" style="--i: 4">5</span>
          <span id="sixth" style="--i: 5">6</span>
          <span id="seventh" style="--i: 6">7</span>
          <span id="eighth" style="--i: 7">8</span>
          <span id="ninth" style="--i: 8">9</span>
          <span id="tenth" style="--i: 9">10</span>
          <span id="eleventh" style="--i: 10">11</span>
          <span id="twelveth" style="--i: 11">12</span>
          <span id="thirteenth" style="--i: 12">13</span>
          <span id="fourteenth" style="--i: 13">14</span>
          <span id="fifteenth" style="--i: 14">15</span>
          <span id="sixteenth" style="--i: 15">16</span>
          <span id="seventeenth" style="--i: 16">17</span>
          <span id="eighteenth" style="--i: 17">18</span>
          <span id="nineteenth" style="--i: 18">19</span>
          <span id="twentieth" style="--i: 19">20</span>
        </div>
        <button id="spin">SPIN</button>
      </div>
      <div id="stop"></div>
      <div id="questionBox"></div>
    </div>
    <div class="nav">
      <button class="navBtns" onclick="window.location.href='index.html'">
        HOME
      </button>
      <button class="navBtns" onclick="window.location.href='gamepage2.html'">
        NEXT
      </button>
    </div>
    <script src="SDGs.js"></script>
  </body>
</html>
